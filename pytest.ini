[pytest]
# 預設執行參數
addopts =
    --html=reports/report.html
    --self-contained-html
    -v

# 測試檔案位置
testpaths = tests

# 標記定義
markers =
    p0: P0 核心測試，每次 Release 必跑
    p1: P1 重要測試，重大版本跑
    p2: P2 一般測試，完整回歸跑
    login: 登入相關測試
    home: 首頁相關測試
    dlt: dlt 站點（DLT來財）專屬測試
    i18n: 多語系文案驗證
    copy: 文案一致性驗證
    visual: 視覺健康度驗證（DOM metrics）
    visual_regression: 截圖 baseline 比對（需先建立 baseline）
    locale_visual: 多語系視覺矩陣截圖 + overflow 驗證（需先建立 baseline）
    language: 多語系切換與登入表單驗證
    api: API 層測試（不啟動瀏覽器，使用 requests 直打 API）
